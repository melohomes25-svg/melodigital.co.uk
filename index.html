<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Melo Digital Ltd</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: white;
    }

    body {
      background: url("background.png") no-repeat center center;
      background-size: cover;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      text-align: center;
      padding-top: 20px; /* HIGHER */
    }

    .logo {
      width: 400px; /* BIGGER */
      max-width: 85%;
      margin-bottom: 40px;
    }

    .content {
      max-width: 700px;
      padding: 0 20px;
    }

    .description {
      font-size: 20px;
      line-height: 1.6;
      margin-bottom: 35px;

      /* 🔥 PREMIUM TEXT STYLE */
      color: rgba(255,255,255,0.9);
      font-weight: 500;
      letter-spacing: 0.3px;

      /* subtle glow like logo */
      text-shadow:
        0 2px 12px rgba(0,0,0,0.6),
        0 0 8px rgba(255,255,255,0.08);
    }

    .contact {
      font-size: 18px;
      margin-bottom: 22px;
    }

    .contact a {
      color: #6fc0ff;
      text-decoration: none;
      font-weight: 600;

      /* slight glow */
      text-shadow: 0 0 6px rgba(111,192,255,0.5);
    }

    .legal {
      font-size: 14px;
      opacity: 0.8;
    }

    .legal a {
      margin: 0 10px;
      color: rgba(255,255,255,0.75);
      text-decoration: none;
    }

    @media (max-width: 600px) {
      body {
        padding-top: 10px;
      }

      .logo {
        width: 280px; /* scaled for mobile */
      }

      .description {
        font-size: 16px;
      }

      .contact {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>

  <img src="logo-melo.png" class="logo" alt="Melo Digital Logo">

  <div class="content">

    <div class="description">
      We build simple, powerful apps designed for everyday use.
      Focused on clarity, reliability, and real-world practicality.
    </div>

    <div class="contact">
      <a href="mailto:support@melodigital.co.uk">
        support@melodigital.co.uk
      </a>
    </div>

    <div class="legal">
      <a href="#">Privacy Policy</a>
      <a href="#">Terms & Conditions</a>
    </div>

  </div>

</body>
</html>
