<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Melo Digital Ltd</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(180deg, #11161d 0%, #1a2430 45%, #0f1c2b 100%);
      color: white;
      text-align: center;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      padding: 0 20px 60px;
      box-sizing: border-box;
    }

    .hero-image {
      width: 100%;
      max-width: 1400px;
      display: block;
      margin: 0 auto 30px;
    }

    .description {
      max-width: 760px;
      font-size: 20px;
      line-height: 1.7;
      opacity: 0.9;
      margin: 10px auto 34px;
    }

    .contact {
      font-size: 18px;
      margin-bottom: 40px;
    }

    a {
      color: #6cb4ff;
      text-decoration: none;
    }

    .legal {
      font-size: 14px;
      opacity: 0.6;
      padding-bottom: 20px;
    }

    .legal a {
      margin: 0 12px;
    }

    @media (max-width: 700px) {
      .description {
        font-size: 18px;
      }

      .contact {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <div class="hero">

    <img src="melodigital-logo.png.png" alt="Melo Digital Ltd" class="hero-image">

    <div class="description">
      We build simple, powerful apps designed for everyday use.
      Focused on clarity, reliability, and real-world practicality.
    </div>

    <div class="contact">
      <a href="mailto:support@melodigital.co.uk">support@melodigital.co.uk</a>
    </div>

    <div class="legal">
      <a href="#">Privacy Policy</a>
      <a href="#">Terms &amp; Conditions</a>
    </div>

  </div>
</body>
</html>
