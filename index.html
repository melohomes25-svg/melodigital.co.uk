<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Melo Digital Ltd</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #0b1c2c;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 100px 20px;
    }

    .logo {
      width: 600px;
      max-width: 90%;
      margin-bottom: 40px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 15px;
    }

    .tagline {
      font-size: 18px;
      opacity: 0.8;
      margin-bottom: 50px;
      letter-spacing: 2px;
    }

    .description {
      font-size: 20px;
      line-height: 1.6;
      opacity: 0.9;
      margin-bottom: 50px;
    }

    .contact {
      margin-top: 40px;
      font-size: 18px;
    }

    a {
      color: #6cb4ff;
      text-decoration: none;
    }

    .legal {
      margin-top: 70px;
      font-size: 14px;
      opacity: 0.6;
    }

    .legal a {
      margin: 0 10px;
    }
  </style>
</head>

<body>

  <div class="container">

    <img src="melodigital-logo.png.png" alt="Melo Digital Logo" class="logo">

    <h1>Melo Digital Ltd</h1>

    <div class="tagline">
      SIMPLE. POWERFUL. EVERYDAY APPS.
    </div>

    <div class="description">
      We build simple, powerful apps designed for everyday use.
      Focused on clarity, reliability, and real-world practicality.
    </div>

    <div class="contact">
      Contact:
      <br><br>
      <a href="mailto:support@melodigital.co.uk">
        support@melodigital.co.uk
      </a>
    </div>

    <div class="legal">
      <a href="#">Privacy Policy</a>
      <a href="#">Terms & Conditions</a>
    </div>

  </div>

</body>
</html>
