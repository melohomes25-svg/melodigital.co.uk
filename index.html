<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Melo Digital Ltd</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #0f1722;
      color: white;
      min-height: 100vh;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
      box-sizing: border-box;
    }

    .hero {
      width: 100%;
      max-width: 1100px;
      min-height: 90vh;
      background-image:
        linear-gradient(to bottom, rgba(10,16,24,0.05) 0%, rgba(10,16,24,0.18) 45%, rgba(10,16,24,0.45) 70%, rgba(10,16,24,0.72) 100%),
        url("melodigital-logo.png.png");
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
      border-radius: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      text-align: center;
      padding: 0 40px 36px;
      box-sizing: border-box;
      position: relative;
      overflow: hidden;
    }

    .content {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
    }

    .description {
      font-size: 20px;
      line-height: 1.65;
      font-weight: 600;
      margin: 0 0 26px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.55);
    }

    .contact {
      font-size: 18px;
      margin: 0 0 28px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.55);
    }

    .contact a {
      color: #7cc7ff;
      text-decoration: none;
      font-weight: 600;
    }

    .legal {
      font-size: 14px;
      opacity: 0.92;
      text-shadow: 0 2px 10px rgba(0,0,0,0.55);
    }

    .legal a {
      color: #c9d8e8;
      text-decoration: none;
      margin: 0 12px;
    }

    @media (max-width: 900px) {
      .hero {
        min-height: 85vh;
        padding: 0 24px 28px;
        background-position: center top;
      }

      .description {
        font-size: 18px;
      }

      .contact {
        font-size: 16px;
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 0;
      }

      .hero {
        min-height: 100vh;
        padding: 0 18px 24px;
        background-position: center top;
      }

      .description {
        font-size: 17px;
        line-height: 1.6;
      }

      .legal a {
        display: inline-block;
        margin: 6px 10px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="hero">
      <div class="content">
        <div class="description">
          We build simple, powerful apps designed for everyday use.
          Focused on clarity, reliability, and real-world practicality.
        </div>

        <div class="contact">
          <a href="mailto:support@melodigital.co.uk">support@melodigital.co.uk</a>
        </div>

        <div class="legal">
          <a href="#">Privacy Policy</a>
          <a href="#">Terms &amp; Conditions</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
