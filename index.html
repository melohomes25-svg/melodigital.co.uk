<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Melo Digital Ltd</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: white;
    }

    body {
      background: url("background.png") no-repeat center center;
      background-size: cover;
      text-align: center;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 20px 24px;
    }

    .logo {
      width: 440px;
      max-width: 85vw;
      height: auto;
      display: block;
      margin: 0 auto 18px;
    }

    .content {
      width: 100%;
      max-width: 760px;
    }

    .text-box {
      background: rgba(12, 16, 22, 0.28);
      backdrop-filter: blur(6px);
      border-radius: 14px;
      padding: 18px 18px;
      margin: 0 auto 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.28);
    }

    .description {
      margin: 0;
      font-size: 22px;
      line-height: 1.55;
      font-weight: 500;
      color: rgba(255,255,255,0.92);
      letter-spacing: 0.2px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }

    .contact {
      margin-bottom: 14px;
      font-size: 18px;
      font-weight: 600;
    }

    .contact a {
      color: #6fc0ff;
      text-decoration: none;
      text-shadow: 0 0 8px rgba(111,192,255,0.35);
    }

    .legal {
      font-size: 14px;
      opacity: 0.82;
      padding-bottom: 8px;
    }

    .legal a {
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      margin: 0 10px;
    }

    @media (max-width: 900px) {
      .logo {
        width: 380px;
      }

      .description {
        font-size: 19px;
      }
    }

    @media (max-width: 600px) {
      .page {
        padding: 6px 14px 20px;
      }

      .logo {
        width: 300px;
        max-width: 88vw;
        margin-bottom: 14px;
      }

      .text-box {
        padding: 14px 14px;
        margin-bottom: 14px;
      }

      .description {
        font-size: 17px;
        line-height: 1.5;
      }

      .contact {
        font-size: 16px;
        margin-bottom: 12px;
      }

      .legal {
        font-size: 12px;
      }

      .legal a {
        display: inline-block;
        margin: 4px 8px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <img src="logo-melo.png" class="logo" alt="Melo Digital Logo">

    <div class="content">
      <div class="text-box">
        <p class="description">
          We build simple, powerful apps designed for everyday use.
          Focused on clarity, reliability, and real-world practicality.
        </p>
      </div>

      <div class="contact">
        <a href="mailto:support@melodigital.co.uk">support@melodigital.co.uk</a>
      </div>

      <div class="legal">
        <a href="#">Privacy Policy</a>
        <a href="#">Terms &amp; Conditions</a>
      </div>
    </div>
  </div>
</body>
</html>
