<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Melo Digital Ltd</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: white;
    }

    body {
      background: url("background.png") no-repeat center center;
      background-size: cover;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      text-align: center;

      /* 👇 reduced top space (HALF of before) */
      padding-top: 10px;
    }

    .logo {
      width: 420px; /* slightly bigger */
      max-width: 85%;
      margin-bottom: 30px;
    }

    .content {
      max-width: 700px;
      padding: 0 20px;
    }

    /* 🔥 NEW PREMIUM TEXT BLOCK */
    .text-box {
      background: rgba(10, 15, 20, 0.35);
      backdrop-filter: blur(6px);
      border-radius: 14px;
      padding: 24px 20px;
      margin-bottom: 30px;

      box-shadow:
        0 8px 30px rgba(0,0,0,0.4),
        inset 0 0 20px rgba(255,255,255,0.03);
    }

    .description {
      font-size: 20px;
      line-height: 1.6;
      margin: 0;

      color: rgba(255,255,255,0.9);
      font-weight: 500;
      letter-spacing: 0.3px;

      text-shadow: 0 2px 12px rgba(0,0,0,0.6);
    }

    .contact {
      font-size: 18px;
      margin-bottom: 20px;
    }

    .contact a {
      color: #6fc0ff;
      text-decoration: none;
      font-weight: 600;

      text-shadow: 0 0 6px rgba(111,192,255,0.5);
    }

    .legal {
      font-size: 14px;
      opacity: 0.8;
    }

    .legal a {
      margin: 0 10px;
      color: rgba(255,255,255,0.75);
      text-decoration: none;
    }

    @media (max-width: 600px) {
      body {
        padding-top: 6px; /* even tighter on mobile */
      }

      .logo {
        width: 300px;
      }

      .description {
        font-size: 16px;
      }

      .text-box {
        padding: 18px 14px;
      }
    }
  </style>
</head>

<body>

  <img src="logo-melo.png" class="logo" alt="Melo Digital Logo">

  <div class="content">

    <div class="text-box">
      <div class="description">
        We build simple, powerful apps designed for everyday use.
        Focused on clarity, reliability, and real-world practicality.
      </div>
    </div>

    <div class="contact">
      <a href="mailto:support@melodigital.co.uk">
        support@melodigital.co.uk
      </a>
    </div>

    <div class="legal">
      <a href="#">Privacy Policy</a>
      <a href="#">Terms & Conditions</a>
    </div>

  </div>

</body>
</html>
