<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Melo Digital Ltd</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: white;
      background: #0f1720;
    }

    body {
      background-image:
        linear-gradient(rgba(10, 15, 20, 0.18), rgba(10, 15, 20, 0.35)),
        url("background.png");
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      text-align: center;
      padding: 48px 20px 36px;
    }

    .content {
      width: 100%;
      max-width: 920px;
    }

    .logo {
      display: block;
      width: 360px;
      max-width: 82vw;
      height: auto;
      margin: 0 auto 26px;
    }

    .description {
      max-width: 760px;
      margin: 0 auto 28px;
      font-size: 22px;
      line-height: 1.65;
      font-weight: 600;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.55);
    }

    .contact {
      margin-bottom: 26px;
      font-size: 18px;
      font-weight: 600;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.55);
    }

    .contact a {
      color: #6fc0ff;
      text-decoration: none;
    }

    .legal {
      font-size: 14px;
      opacity: 0.9;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.55);
    }

    .legal a {
      color: #d6dde6;
      text-decoration: none;
      margin: 0 12px;
    }

    @media (max-width: 900px) {
      .page {
        padding-top: 34px;
      }

      .logo {
        width: 300px;
        max-width: 84vw;
        margin-bottom: 22px;
      }

      .description {
        font-size: 18px;
        max-width: 640px;
      }

      .contact {
        font-size: 17px;
      }
    }

    @media (max-width: 600px) {
      body {
        background-attachment: scroll;
      }

      .page {
        min-height: 100vh;
        padding: 26px 16px 24px;
      }

      .logo {
        width: 230px;
        max-width: 86vw;
        margin-bottom: 18px;
      }

      .description {
        font-size: 16px;
        line-height: 1.6;
        margin-bottom: 22px;
      }

      .contact {
        font-size: 16px;
        margin-bottom: 20px;
      }

      .legal {
        font-size: 13px;
      }

      .legal a {
        display: inline-block;
        margin: 6px 10px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="content">
      <img src="logo-melo.png" alt="Melo Digital Ltd" class="logo" />

      <div class="description">
        We build simple, powerful apps designed for everyday use.
        Focused on clarity, reliability, and real-world practicality.
      </div>

      <div class="contact">
        <a href="mailto:support@melodigital.co.uk">support@melodigital.co.uk</a>
      </div>

      <div class="legal">
        <a href="#">Privacy Policy</a>
        <a href="#">Terms &amp; Conditions</a>
      </div>
    </div>
  </div>
</body>
</html>
