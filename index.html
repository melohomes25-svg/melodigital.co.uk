<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Melo Digital Ltd</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    body {
      background: url("background.png") no-repeat center center;
      background-size: cover;
      text-align: center;
      color: white;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 6px 20px 24px;
    }

    .logo {
      width: 460px;
      max-width: 85vw;
      height: auto;
      display: block;
      margin: 0 auto 12px;
    }

    .content {
      width: 100%;
      max-width: 760px;
    }

    .text-box {
      background: rgba(10, 14, 20, 0.25);
      backdrop-filter: blur(8px);
      border-radius: 16px;
      padding: 20px;
      margin: 0 auto 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    /* 🔥 MAJOR TEXT UPGRADE */
    .description {
      margin: 0;
      font-size: 22px;
      line-height: 1.6;
      font-weight: 600;
      letter-spacing: 0.4px;

      /* Metallic gradient text */
      background: linear-gradient(
        90deg,
        #d6dbe0,
        #ffffff,
        #c8ced6
      );

      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;

      /* Depth + glow */
      text-shadow:
        0 2px 10px rgba(0,0,0,0.7),
        0 0 18px rgba(200,220,255,0.25);
    }

    .contact {
      margin-bottom: 14px;
      font-size: 18px;
      font-weight: 600;
    }

    .contact a {
      background: linear-gradient(
        90deg,
        #6fc0ff,
        #a8ddff
      );

      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;

      text-decoration: none;

      text-shadow:
        0 0 10px rgba(111,192,255,0.5),
        0 0 20px rgba(111,192,255,0.3);
    }

    .legal {
      font-size: 14px;
      opacity: 0.85;
      padding-bottom: 8px;
    }

    .legal a {
      color: rgba(220,225,230,0.7);
      text-decoration: none;
      margin: 0 10px;
      transition: 0.2s ease;
    }

    .legal a:hover {
      color: white;
      text-shadow: 0 0 8px rgba(255,255,255,0.3);
    }

    @media (max-width: 900px) {
      .logo {
        width: 380px;
      }

      .description {
        font-size: 19px;
      }
    }

    @media (max-width: 600px) {
      .page {
        padding: 4px 14px 20px;
      }

      .logo {
        width: 300px;
        max-width: 88vw;
        margin-bottom: 10px;
      }

      .text-box {
        padding: 16px;
        margin-bottom: 14px;
      }

      .description {
        font-size: 17px;
      }

      .contact {
        font-size: 16px;
        margin-bottom: 12px;
      }

      .legal {
        font-size: 12px;
      }

      .legal a {
        display: inline-block;
        margin: 4px 8px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <img src="logo-melo.png" class="logo" alt="Melo Digital Logo">

    <div class="content">
      <div class="text-box">
        <p class="description">
          We build simple, powerful apps designed for everyday use.
          Focused on clarity, reliability, and real-world practicality.
        </p>
      </div>

      <div class="contact">
        <a href="mailto:support@melodigital.co.uk">support@melodigital.co.uk</a>
      </div>

      <div class="legal">
        <a href="#">Privacy Policy</a>
        <a href="#">Terms &amp; Conditions</a>
      </div>
    </div>
  </div>
</body>
</html>
