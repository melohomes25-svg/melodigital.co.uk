<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Melo Digital Ltd</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: white;
    }

    body {
      background: url("background.png") no-repeat center center;
      background-size: cover;
      text-align: center;
    }

    .page {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 0;
      position: relative;
    }

    .logo-wrap {
      width: 100%;
      padding-top: 18px;
      margin-bottom: 18px;
    }

    .logo {
      width: 520px;
      max-width: 82vw;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    .content {
      width: 100%;
      max-width: 760px;
      padding: 0 24px;
    }

    .text-box {
      display: inline-block;
      max-width: 760px;
      padding: 18px 22px;
      background: rgba(10, 14, 18, 0.22);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.28);
      margin-bottom: 18px;
    }

    .description {
      margin: 0;
      font-size: 24px;
      line-height: 1.55;
      font-weight: 500;
      letter-spacing: 0.2px;
      color: rgba(255,255,255,0.92);
      text-shadow: 0 2px 14px rgba(0,0,0,0.5);
    }

    .contact {
      margin-bottom: 12px;
      font-size: 18px;
      font-weight: 600;
    }

    .contact a {
      color: #6fc0ff;
      text-decoration: none;
      text-shadow: 0 0 8px rgba(111,192,255,0.35);
    }

    .legal {
      font-size: 14px;
      opacity: 0.82;
    }

    .legal a {
      color: rgba(255,255,255,0.78);
      text-decoration: none;
      margin: 0 10px;
    }

    @media (max-width: 900px) {
      .logo-wrap {
        padding-top: 10px;
      }

      .logo {
        width: 420px;
        max-width: 84vw;
      }

      .description {
        font-size: 20px;
      }
    }

    @media (max-width: 600px) {
      html, body {
        overflow-y: auto;
      }

      .page {
        min-height: 100vh;
        height: auto;
        padding-bottom: 24px;
      }

      .logo-wrap {
        padding-top: 6px;
        margin-bottom: 12px;
      }

      .logo {
        width: 290px;
        max-width: 86vw;
      }

      .content {
        padding: 0 16px;
      }

      .text-box {
        padding: 14px 14px;
        margin-bottom: 14px;
      }

      .description {
        font-size: 17px;
        line-height: 1.5;
      }

      .contact {
        font-size: 16px;
      }

      .legal {
        font-size: 12px;
      }

      .legal a {
        display: inline-block;
        margin: 4px 8px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="logo-wrap">
      <img src="logo-melo.png" class="logo" alt="Melo Digital Logo">
    </div>

    <div class="content">
      <div class="text-box">
        <p class="description">
          We build simple, powerful apps designed for everyday use.
          Focused on clarity, reliability, and real-world practicality.
        </p>
      </div>

      <div class="contact">
        <a href="mailto:support@melodigital.co.uk">support@melodigital.co.uk</a>
      </div>

      <div class="legal">
        <a href="#">Privacy Policy</a>
        <a href="#">Terms &amp; Conditions</a>
      </div>
    </div>
  </div>
</body>
</html>
